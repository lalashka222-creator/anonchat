<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 Чат</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0b0d15;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            transition: background 0.3s, color 0.3s;
        }

        /* --- ТЕМЫ (твои) --- */
        body.light {
            background: #f0f2f5;
            color: #111;
        }
        body.light .app { background: #ffffff; border-color: #d0d0d0; }
        body.light .msg { background: #e4e6eb; }
        body.light .input-area { background: #f0f2f5; border-color: #d0d0d0; }
        body.light .input-area input { color: #111; }

        body.yellow {
            background: #fef9e0;
            color: #1e1a0a;
        }
        body.yellow .app { background: #fffbe6; border-color: #e6d8a0; }
        body.yellow .msg { background: #f5edc0; }
        body.yellow .input-area { background: #f5edc0; border-color: #e6d8a0; }
        body.yellow .input-area input { color: #1e1a0a; }

        .app {
            max-width: 500px;
            width: 100%;
            background: #12161f;
            padding: 24px 20px 20px;
            border-radius: 32px;
            border: 1px solid #1e2538;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: background 0.3s, border 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .header h2 {
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(135deg, #6d8aff, #b47aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .theme-btn {
            background: #1a2030;
            border: none;
            color: #e0e0e0;
            font-size: 20px;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .theme-btn:hover { background: #2a2f45; }

        #messages {
            height: 340px;
            overflow-y: auto;
            background: #0b0d15;
            padding: 14px;
            border-radius: 20px;
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: background 0.3s;
        }
        body.light #messages { background: #f0f2f5; }
        body.yellow #messages { background: #fef9e0; }

        .msg {
            background: #1a2030;
            padding: 10px 16px;
            border-radius: 18px;
            max-width: 85%;
            word-break: break-word;
            border-left: 3px solid #6d8aff;
            transition: background 0.3s;
        }
        .msg .nick {
            font-size: 12px;
            font-weight: 600;
            color: #9bb1ff;
            margin-bottom: 2px;
        }
        .msg .text {
            font-size: 15px;
            line-height: 1.4;
        }
        .msg.own {
            align-self: flex-end;
            border-left-color: #00cc88;
        }
        .msg.own .nick { color: #00cc88; }

        .input-area {
            display: flex;
            gap: 10px;
            background: #0b0d15;
            padding: 6px 6px 6px 18px;
            border-radius: 40px;
            border: 1px solid #1e2538;
            transition: background 0.3s, border 0.3s;
        }
        .input-area input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e0e0e0;
            font-size: 15px;
            padding: 12px 0;
            outline: none;
            min-width: 0;
        }
        .input-area input::placeholder { color: #667; }
        .input-area button {
            background: #6d8aff;
            border: none;
            padding: 12px 22px;
            border-radius: 40px;
            font-weight: 600;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-area button:hover { background: #5a73e0; }

        .id-btn {
            background: #1a2030;
            border: 1px solid #1e2538;
            color: #e0e0e0;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .id-btn:hover { background: #2a2f45; }
        .footer {
            font-size: 12px;
            color: #667;
            text-align: center;
            margin-top: 16px;
        }

        @media (max-width: 500px) {
            .app { padding: 16px; }
            #messages { height: 260px; }
            .input-area input { font-size: 14px; }
            .input-area button { padding: 10px 16px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="app" id="app">
    <div class="header">
        <h2>💬 Чат</h2>
        <div style="display:flex; gap:8px; align-items:center;">
            <button class="id-btn" id="myIdBtn">👤 ID</button>
            <button class="theme-btn" id="themeBtn">🎨</button>
        </div>
    </div>

    <div id="messages"></div>

    <div class="input-area">
        <input id="msgInput" placeholder="Сообщение..." autofocus>
        <button id="sendBtn">➤</button>
    </div>

    <div class="footer">🔒 Данные шифруются. Только ты и твой собеседник.</div>
</div>

<script>
    // ============================================
    // 1. FIREBASE (твой конфиг — без изменений)
    // ============================================
    const firebaseConfig = {
        apiKey: "AIzaSyCPiopo6vRsTyhUnoDpztKNFa84aYzS34s",
        authDomain: "sanyachats-2493a.firebaseapp.com",
        databaseURL: "https://sanyachats-2493a-default-rtdb.firebaseio.com",
        projectId: "sanyachats-2493a",
        storageBucket: "sanyachats-2493a.firebasestorage.app",
        messagingSenderId: "191784487633",
        appId: "1:191784487633:web:f290156eb5279b1273d3f0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ============================================
    // 2. ЕЖЕДНЕВНАЯ СМЕНА ID (анонимность)
    // ============================================
    function getDailyId() {
        const today = new Date().toISOString().slice(0, 10);
        const stored = localStorage.getItem('anon_daily_id');
        const storedDate = localStorage.getItem('anon_daily_date');
        if (stored && storedDate === today) return stored;
        const newId = 'U' + Math.random().toString(36).substring(2, 8).toUpperCase();
        localStorage.setItem('anon_daily_id', newId);
        localStorage.setItem('anon_daily_date', today);
        return newId;
    }

    const myId = getDailyId();
    const myUid = 'anon_' + myId;

    // ============================================
    // 3. КРИПТОГРАФИЯ (AES-GCM) — E2EE
    // ============================================
    async function deriveKey(id) {
        const encoder = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
            'raw',
            encoder.encode(id + '::s0lT::2026'),
            { name: 'PBKDF2' },
            false,
            ['deriveKey']
        );
        return await crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: encoder.encode('chat_salt'), iterations: 100000, hash: 'SHA-256' },
            keyMaterial,
            { name: 'AES-GCM', length: 256 },
            false,
            ['encrypt', 'decrypt']
        );
    }

    let encryptionKey = null;
    deriveKey(myId).then(key => { encryptionKey = key; });

    async function encryptMessage(text) {
        if (!encryptionKey) {
            await new Promise(r => setTimeout(r, 300));
            return await encryptMessage(text);
        }
        const encoder = new TextEncoder();
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await crypto.subtle.encrypt(
            { name: 'AES-GCM', iv: iv },
            encryptionKey,
            encoder.encode(text)
        );
        const combined = new Uint8Array(iv.length + encrypted.byteLength);
        combined.set(iv, 0);
        combined.set(new Uint8Array(encrypted), iv.length);
        return btoa(String.fromCharCode(...combined));
    }

    async function decryptMessage(combinedBase64) {
        if (!encryptionKey) {
            await new Promise(r => setTimeout(r, 300));
            return await decryptMessage(combinedBase64);
        }
        const combined = Uint8Array.from(atob(combinedBase64), c => c.charCodeAt(0));
        const iv = combined.slice(0, 12);
        const encrypted = combined.slice(12);
        const decrypted = await crypto.subtle.decrypt(
            { name: 'AES-GCM', iv: iv },
            encryptionKey,
            encrypted
        );
        return new TextDecoder().decode(decrypted);
    }

    // ============================================
    // 4. ЧАТ (шифрование/дешифрование)
    // ============================================
    const messagesDiv = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');

    // Слушаем новые сообщения
    const chatRef = db.ref('chats/' + myUid);
    chatRef.limitToLast(50).on('child_added', async (snap) => {
        const data = snap.val();
        if (!data || !data.encrypted) return;
        try {
            const decrypted = await decryptMessage(data.encrypted);
            const div = document.createElement('div');
            div.className = 'msg';
            if (data.from === myId) div.classList.add('own');
            div.innerHTML = `
                <div class="nick">${data.from}</div>
                <div class="text">${decrypted}</div>
            `;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        } catch (e) {
            // тихо игнорируем
        }
    });

    // Отправка
    async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || !encryptionKey) return;

        const encrypted = await encryptMessage(text);
        chatRef.push({
            from: myId,
            encrypted: encrypted,
            timestamp: Date.now()
        });

        // Оптимистичный вывод
        const div = document.createElement('div');
        div.className = 'msg own';
        div.innerHTML = `
            <div class="nick">${myId}</div>
            <div class="text">${text}</div>
        `;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        msgInput.value = '';
    }

    sendBtn.onclick = sendMessage;
    msgInput.onkeydown = (e) => {
        if (e.key === 'Enter') sendMessage();
    };

    // ============================================
    // 5. ТЕМЫ (твои — тёмная/светлая/жёлтая)
    // ============================================
    const themes = ['dark', 'light', 'yellow'];
    let themeIndex = parseInt(localStorage.getItem('chat_theme_index')) || 0;
    document.body.className = themes[themeIndex] === 'dark' ? '' : themes[themeIndex];
    document.getElementById('themeBtn').onclick = () => {
        themeIndex = (themeIndex + 1) % themes.length;
        document.body.className = themes[themeIndex] === 'dark' ? '' : themes[themeIndex];
        localStorage.setItem('chat_theme_index', themeIndex);
    };

    // ============================================
    // 6. ПОКАЗАТЬ ID
    // ============================================
    document.getElementById('myIdBtn').onclick = () => {
        alert('🔑 Твой ID: ' + myId + '\nДействителен до: ' + new Date().toISOString().slice(0, 10));
    };

    // ============================================
    // 7. ПРИВЕТСТВИЕ (системное)
    // ============================================
    const sys = document.createElement('div');
    sys.className = 'msg';
    sys.style.background = 'transparent';
    sys.style.borderLeft = '2px solid #4ade80';
    sys.style.fontSize = '12px';
    sys.style.color = '#667';
    sys.innerHTML = `
        <div class="nick">🔐 Система</div>
        <div class="text">Твой ID: ${myId}. Меняется каждый день. Все сообщения зашифрованы.</div>
    `;
    messagesDiv.appendChild(sys);

    console.log('🔒 Анонимный чат запущен. ID:', myId);
</script>
</body>
</html>
