<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0b0d15; color:#e0e0e0; font-family:system-ui; display:flex; justify-content:center; align-items:center; height:100vh; }
        .app { width:400px; background:#12161f; padding:20px; border-radius:24px; border:1px solid #1e2538; }
        #messages { height:300px; overflow-y:auto; background:#0b0d15; padding:12px; border-radius:16px; margin-bottom:10px; }
        .msg { background:#1a2030; padding:8px 14px; border-radius:14px; margin-bottom:6px; }
        .msg .nick { font-size:12px; color:#9bb1ff; }
        .flex { display:flex; gap:8px; }
        input { flex:1; padding:10px; border-radius:30px; border:1px solid #1e2538; background:#0b0d15; color:#fff; }
        button { padding:10px 18px; border-radius:30px; border:none; background:#6d8aff; color:#fff; font-weight:600; cursor:pointer; }
        .ai-btn { background:#00cc88; }
    </style>
</head>
<body>
<div class="app">
    <h2>💬 Чат</h2>
    <div id="messages"></div>
    <div class="flex">
        <input id="msgInput" placeholder="Сообщение...">
        <button id="sendBtn">➤</button>
        <button id="aiBtn" class="ai-btn">🧠</button>
    </div>
</div>

<script>
    // ============================================================
    // 1. FIREBASE
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyCPiopo6vRsTyhUnoDpztKNFa84aYzS34s",
        authDomain: "sanyachats-2493a.firebaseapp.com",
        databaseURL: "https://sanyachats-2493a-default-rtdb.firebaseio.com",
        projectId: "sanyachats-2493a",
        storageBucket: "sanyachats-2493a.firebasestorage.app",
        messagingSenderId: "191784487633",
        appId: "1:191784487633:web:f290156eb5279b1273d3f0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ============================================================
    // 2. ТВОЙ ID
    // ============================================================
    const myId = prompt('Введите ваш ID:') || 'anon';
    const myUid = 'anon_' + myId;

    // ============================================================
    // 3. КОНТАКТ (С КЕМ ОБЩАЕШЬСЯ)
    // ============================================================
    const contactId = prompt('Введите ID собеседника:') || 'friend';
    const contactUid = 'anon_' + contactId;

    // ============================================================
    // 4. DOM
    // ============================================================
    const messagesDiv = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const aiBtn = document.getElementById('aiBtn');

    // ============================================================
    // 5. СЛУШАЕМ СООБЩЕНИЯ В ЭТОМ ЧАТЕ
    // ============================================================
    const chatRef = db.ref('chats/' + myUid + '/' + contactUid);
    chatRef.limitToLast(50).on('child_added', snap => {
        const data = snap.val();
        if (!data) return;
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<div class="nick">${data.from}</div><div>${data.text || data.ai || ''}</div>`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    // ============================================================
    // 6. ОТПРАВКА СООБЩЕНИЯ (В ОБА ЧАТА)
    // ============================================================
    function sendMessage(text) {
        if (!text) return;

        // Отправляем в чат отправителя (мой)
        db.ref('chats/' + myUid + '/' + contactUid).push({
            from: myId,
            text: text,
            timestamp: Date.now()
        });

        // Отправляем в чат получателя (собеседника)
        db.ref('chats/' + contactUid + '/' + myUid).push({
            from: myId,
            text: text,
            timestamp: Date.now()
        });

        msgInput.value = '';
    }

    sendBtn.onclick = () => sendMessage(msgInput.value.trim());
    msgInput.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(msgInput.value.trim()); };

    // ============================================================
    // 7. ИИ (DUCKDUCKGO)
    // ============================================================
    async function askAI(question) {
        if (!question) return alert('Напиши вопрос');
        // Показываем вопрос в чате
        sendMessage(question);
        try {
            const resp = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(question)}&format=json&no_html=1&skip_disambig=1`);
            const data = await resp.json();
            const answer = data.AbstractText || '❌ Не нашёл ответа.';
            // Отправляем ответ ИИ в чат
            db.ref('chats/' + myUid + '/' + contactUid).push({
                from: 'ИИ',
                ai: answer,
                timestamp: Date.now()
            });
            db.ref('chats/' + contactUid + '/' + myUid).push({
                from: 'ИИ',
                ai: answer,
                timestamp: Date.now()
            });
        } catch {
            db.ref('chats/' + myUid + '/' + contactUid).push({
                from: 'ИИ',
                ai: '⚠️ Ошибка, попробуй позже.',
                timestamp: Date.now()
            });
            db.ref('chats/' + contactUid + '/' + myUid).push({
                from: 'ИИ',
                ai: '⚠️ Ошибка, попробуй позже.',
                timestamp: Date.now()
            });
        }
    }

    aiBtn.onclick = () => {
        const q = msgInput.value.trim();
        if (!q) return alert('Напиши вопрос');
        askAI(q);
        msgInput.value = '';
    };
</script>
</body>
</html>
