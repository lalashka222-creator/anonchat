<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🔐 Анонимный чат</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style id="theme-style">
        :root {
            --bg: #0b0d15;
            --surface: #12161f;
            --border: #1e2538;
            --text: #e0e0e0;
            --accent: #6d8aff;
            --nick-color: #9bb1ff;
            --input-bg: #0b0d15;
            --card: #1a2030;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            transition: 0.3s;
            min-height: 100vh;
        }
        .app {
            max-width: 700px;
            width: 100%;
            background: var(--surface);
            padding: 20px;
            border-radius: 30px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        input, button {
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 14px;
            transition: 0.3s;
        }
        button {
            background: var(--accent);
            font-weight: 600;
            cursor: pointer;
        }
        .msg {
            background: var(--card);
            padding: 8px 14px;
            border-radius: 14px;
            margin-bottom: 6px;
            border-left: 4px solid var(--accent);
        }
        .msg .nick { font-weight: 600; color: var(--nick-color); font-size: 13px; }
        #messages { height: 300px; overflow-y: auto; background: var(--input-bg); padding: 12px; border-radius: 16px; margin: 12px 0; }
        .hidden { display: none; }
        .id-box { background: var(--input-bg); padding: 6px 14px; border-radius: 40px; font-family: monospace; display: inline-block; }
        .profile-card { background: var(--card); padding: 16px; border-radius: 20px; margin-top: 12px; border: 1px solid var(--border); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .contact-card { background: var(--card); padding: 12px; border-radius: 16px; margin: 6px 0; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .chat-list { max-height: 200px; overflow-y: auto; }
        .notification {
            background: #ff6b6b;
            color: #fff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="top-bar">
        <h2>🔐 Анонимный чат</h2>
        <div class="flex">
            <button id="profileBtn">👤 Профиль</button>
            <button id="themeToggleBtn" class="theme-btn">🎨 Тема</button>
        </div>
    </div>

    <div id="profileBox" class="hidden profile-card">
        <div class="flex" style="justify-content: space-between;">
            <span><strong>Ваш ID сегодня:</strong></span>
            <span class="id-box" id="userTodayId">—</span>
        </div>
        <div style="font-size:12px; color:#667;">⏳ ID меняется каждый день</div>
        <button id="closeProfileBtn" style="margin-top:12px; background:#444;">Закрыть</button>
    </div>

    <!-- Добавление друга -->
    <div class="flex" style="margin:12px 0;">
        <input id="addFriendInput" placeholder="Введите ID друга (5 символов)" style="flex:1;">
        <button id="addFriendBtn">➕ Добавить</button>
    </div>
    <div id="addFriendResult" style="font-size:14px; color:#667;"></div>

    <!-- Список контактов -->
    <h3>📇 Контакты</h3>
    <div id="contactsList" class="chat-list"></div>

    <!-- Чат с выбранным контактом -->
    <div id="chatArea">
        <div class="flex" style="justify-content: space-between;">
            <h4 id="chatWithLabel">💬 Выберите контакт</h4>
            <span id="unreadBadge" class="hidden notification">🔔</span>
        </div>
        <div id="messages"></div>
        <div class="flex">
            <input id="msgInput" placeholder="Напиши..." style="flex:1;">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <div class="flex" style="margin-top:10px;">
        <input id="keyInput" placeholder="Общий пароль" value="секрет2026" style="flex:2;">
        <button id="keySave">💾</button>
    </div>
    <div style="font-size:12px; color:#667; margin-top:10px; text-align:center;">
        🔒 Всё шифруется AES. Без ключа никто не прочитает.
    </div>
</div>

<script>
    // ============================================================
    // КОНФИГ FIREBASE
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyCPiopo6vRsTyhUnoDpztKNFa84aYzS34s",
        authDomain: "sanyachats-2493a.firebaseapp.com",
        databaseURL: "https://sanyachats-2493a-default-rtdb.firebaseio.com",
        projectId: "sanyachats-2493a",
        storageBucket: "sanyachats-2493a.firebasestorage.app",
        messagingSenderId: "191784487633",
        appId: "1:191784487633:web:f290156eb5279b1273d3f0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ============================================================
    // ГЕНЕРАЦИЯ ID (5 символов)
    // ============================================================
    function getTodayId() {
        const today = new Date().toISOString().slice(0,10);
        const hash = CryptoJS.SHA256(today + "sanyachats_salt").toString(CryptoJS.enc.Hex);
        return hash.slice(0, 5);
    }
    function getTodayUid() {
        const today = new Date().toISOString().slice(0,10);
        return "anon_" + CryptoJS.SHA256(today + "uid_salt").toString(CryptoJS.enc.Hex).slice(0, 8);
    }

    const myUid = getTodayUid();
    const myId = getTodayId();

    // ============================================================
    // ШИФРОВАНИЕ
    // ============================================================
    let secretKey = localStorage.getItem('chat_key') || "секрет2026";
    document.getElementById('keyInput').value = secretKey;

    function encrypt(text) {
        return CryptoJS.AES.encrypt(text, secretKey).toString();
    }
    function decrypt(cipher) {
        try {
            const bytes = CryptoJS.AES.decrypt(cipher, secretKey);
            return bytes.toString(CryptoJS.enc.Utf8);
        } catch {
            return "🔒 Неверный ключ";
        }
    }

    // ============================================================
    // DOM
    // ============================================================
    const messagesDiv = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const keyInput = document.getElementById('keyInput');
    const keySave = document.getElementById('keySave');
    const profileBox = document.getElementById('profileBox');
    const userTodayId = document.getElementById('userTodayId');
    const profileBtn = document.getElementById('profileBtn');
    const closeProfileBtn = document.getElementById('closeProfileBtn');
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const contactsList = document.getElementById('contactsList');
    const addFriendInput = document.getElementById('addFriendInput');
    const addFriendBtn = document.getElementById('addFriendBtn');
    const addFriendResult = document.getElementById('addFriendResult');
    const chatWithLabel = document.getElementById('chatWithLabel');
    const unreadBadge = document.getElementById('unreadBadge');

    userTodayId.textContent = myId;

    // ============================================================
    // ТЕМЫ
    // ============================================================
    const themes = {
        black: { '--bg': '#0b0d15', '--surface': '#12161f', '--border': '#1e2538', '--text': '#e0e0e0', '--accent': '#6d8aff', '--nick-color': '#9bb1ff', '--input-bg': '#0b0d15', '--card': '#1a2030' },
        white: { '--bg': '#f5f5f5', '--surface': '#ffffff', '--border': '#d0d0d0', '--text': '#111111', '--accent': '#4a7acc', '--nick-color': '#3a5faa', '--input-bg': '#e8e8e8', '--card': '#eef0f4' },
        yellow: { '--bg': '#fef9e0', '--surface': '#fffbe6', '--border': '#e6d8a0', '--text': '#1e1a0a', '--accent': '#cc9900', '--nick-color': '#996600', '--input-bg': '#f5edc0', '--card': '#f5edc0' }
    };
    let themeIndex = 0;
    const themeNames = ['black', 'white', 'yellow'];
    function applyTheme(name) {
        const t = themes[name];
        if (!t) return;
        for (let key in t) document.documentElement.style.setProperty(key, t[key]);
        localStorage.setItem('theme', name);
    }
    applyTheme(localStorage.getItem('theme') || 'black');
    themeToggleBtn.onclick = () => {
        themeIndex = (themeIndex + 1) % themeNames.length;
        applyTheme(themeNames[themeIndex]);
    };
    profileBtn.onclick = () => profileBox.classList.toggle('hidden');
    closeProfileBtn.onclick = () => profileBox.classList.add('hidden');

    // ============================================================
    // СОСТОЯНИЕ
    // ============================================================
    let currentContactUid = null;
    let contacts = {};
    let unreadCount = 0;
    let nick = localStorage.getItem('anon_nick') || 'anon';

    // ============================================================
    // ЗАГРУЗКА КОНТАКТОВ
    // ============================================================
    function loadContacts() {
        db.ref('contacts/' + myUid).once('value').then(snap => {
            contacts = snap.val() || {};
            renderContacts();
        });
    }

    function renderContacts() {
        contactsList.innerHTML = '';
        const keys = Object.keys(contacts);
        if (keys.length === 0) {
            contactsList.innerHTML = '<div style="color:#667;">Нет контактов</div>';
            return;
        }
        for (let uid of keys) {
            const data = contacts[uid];
            const div = document.createElement('div');
            div.className = 'contact-card';
            div.innerHTML = `
                <span><strong>${data.nick || 'Без имени'}</strong> (ID: ${data.id})</span>
                <button onclick="openChat('${uid}')" style="background:#6d8aff;">💬</button>
            `;
            contactsList.appendChild(div);
        }
    }

    // ============================================================
    // ДОБАВЛЕНИЕ ДРУГА
    // ============================================================
    addFriendBtn.onclick = () => {
        const friendId = addFriendInput.value.trim();
        if (friendId.length !== 5) {
            addFriendResult.textContent = '❌ ID должен быть ровно 5 символов';
            return;
        }
        // Ищем пользователя по ID
        db.ref('users').once('value').then(snap => {
            const users = snap.val() || {};
            let found = null;
            for (let uid in users) {
                if (users[uid].id === friendId) {
                    found = { uid, data: users[uid] };
                    break;
                }
            }
            if (found) {
                // Сохраняем в контакты
                db.ref('contacts/' + myUid + '/' + found.uid).set({
                    id: found.data.id,
                    nick: found.data.nick || 'Без имени'
                }).then(() => {
                    addFriendResult.textContent = '✅ Друг добавлен!';
                    loadContacts();
                });
            } else {
                addFriendResult.textContent = '❌ Пользователь с таким ID не найден';
            }
        });
    };

    // ============================================================
    // ОТКРЫТИЕ ЧАТА
    // ============================================================
    window.openChat = function(contactUid) {
        currentContactUid = contactUid;
        const contact = contacts[contactUid];
        chatWithLabel.textContent = `💬 Чат с ${contact.nick || 'anon'}`;
        unreadBadge.classList.add('hidden');
        unreadCount = 0;
        loadMessages(contactUid);
    };

    // ============================================================
    // ЗАГРУЗКА СООБЩЕНИЙ (личные)
    // ============================================================
    function loadMessages(contactUid) {
        const chatRef = db.ref('chats/' + myUid + '/' + contactUid);
        messagesDiv.innerHTML = '';
        chatRef.limitToLast(50).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const decrypted = decrypt(data.encrypted);
            const div = document.createElement('div');
            div.className = 'msg';
            const sender = data.from === myUid ? 'Вы' : (contacts[data.from]?.nick || 'anon');
            div.innerHTML = `<div class="nick">${sender}</div><div>${decrypted}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            // если сообщение от другого и чат не открыт — уведомление
            if (data.from !== myUid && currentContactUid !== data.from) {
                unreadCount++;
                unreadBadge.classList.remove('hidden');
                unreadBadge.textContent = '🔔 ' + unreadCount;
            }
        });
    }

    // ============================================================
    // ОТПРАВКА ЛИЧНОГО СООБЩЕНИЯ
    // ============================================================
    function sendMessage() {
        if (!currentContactUid) {
            alert('Сначала выберите контакт');
            return;
        }
        const text = msgInput.value.trim();
        if (!text) return;

        const chatRef = db.ref('chats/' + myUid + '/' + currentContactUid);
        chatRef.push({
            from: myUid,
            encrypted: encrypt(text),
            timestamp: Date.now()
        });

        // Отправляем также в чат получателя
        const otherChatRef = db.ref('chats/' + currentContactUid + '/' + myUid);
        otherChatRef.push({
            from: myUid,
            encrypted: encrypt(text),
            timestamp: Date.now()
        });

        msgInput.value = '';
    }

    sendBtn.onclick = sendMessage;
    msgInput.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };

    // ============================================================
    // СОХРАНЕНИЕ ПРОФИЛЯ В БАЗУ
    // ============================================================
    function saveProfile() {
        db.ref('users/' + myUid).set({
            id: myId,
            nick: nick,
            lastSeen: Date.now()
        });
    }

    // ============================================================
    // АВТОМАТИЧЕСКОЕ ОБНОВЛЕНИЕ СПИСКА КОНТАКТОВ
    // ============================================================
    db.ref('contacts/' + myUid).on('value', () => {
        loadContacts();
    });

    // ============================================================
    // КЛЮЧ
    // ============================================================
    keySave.onclick = () => {
        const newKey = keyInput.value.trim();
        if (newKey) {
            secretKey = newKey;
            localStorage.setItem('chat_key', newKey);
            alert('✅ Ключ сохранён!');
        }
    };

    // ============================================================
    // ЗАПУСК
    // ============================================================
    saveProfile();
    loadContacts();

    // Если нет контактов — показываем заглушку
    if (!currentContactUid) {
        chatWithLabel.textContent = '💬 Выберите контакт';
    }

    console.log(`🔐 Твой ID: ${myId}`);
    console.log(`👤 Твой ник: ${nick}`);
</script>
</body>
</html>
