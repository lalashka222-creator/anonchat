<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💬 Чат</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0b0d15; color:#e0e0e0; font-family:system-ui; display:flex; height:100vh; overflow:hidden; }

        /* Панель контактов */
        #sidebar {
            width:280px;
            background:#12161f;
            border-right:1px solid #1e2538;
            padding:16px;
            display:flex;
            flex-direction:column;
            transition:0.3s;
            overflow:hidden;
        }
        #sidebar.hidden { width:0; padding:0; border:none; }
        #sidebar .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        #sidebar .header button { background:transparent; border:none; color:#e0e0e0; font-size:20px; cursor:pointer; }
        #sidebar input { width:100%; padding:10px; border-radius:30px; border:1px solid #1e2538; background:#0b0d15; color:#fff; margin-bottom:10px; }
        .contact-item { padding:10px; border-radius:12px; cursor:pointer; margin-bottom:4px; display:flex; justify-content:space-between; align-items:center; }
        .contact-item:hover { background:#1a2030; }
        .contact-item .online { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:8px; }
        .contact-item .online.on { background:#00ff88; }
        .contact-item .online.off { background:#555; }
        .contact-item .del { background:#ff6b6b; border:none; color:#fff; border-radius:20px; padding:2px 10px; font-size:12px; cursor:pointer; }
        #contactsList { flex:1; overflow-y:auto; }
        .group-item { padding:10px; border-radius:12px; cursor:pointer; margin-bottom:4px; border-left:3px solid #ffd700; }
        .group-item:hover { background:#1a2030; }

        /* Основной чат */
        #main {
            flex:1;
            display:flex;
            flex-direction:column;
            background:#0b0d15;
            padding:16px;
            min-width:0;
        }
        #main .top { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
        #main .top button { background:transparent; border:none; color:#e0e0e0; font-size:22px; cursor:pointer; }
        #main .top h3 { flex:1; font-weight:400; }
        #messages {
            flex:1;
            overflow-y:auto;
            background:#0f111f;
            border-radius:16px;
            padding:12px;
            margin-bottom:10px;
            display:flex;
            flex-direction:column;
            gap:4px;
        }
        .msg {
            background:#1a2030;
            padding:8px 14px;
            border-radius:16px;
            border-left:3px solid #6d8aff;
            max-width:90%;
            word-break:break-word;
            cursor:pointer;
        }
        .msg.own { border-left-color:#00cc88; align-self:flex-end; }
        .msg .nick { font-size:12px; font-weight:600; color:#9bb1ff; }
        .msg .ai-label { color:#00ff88; font-weight:600; }
        .msg img, .msg video { max-width:100%; border-radius:10px; max-height:200px; margin-top:4px; }
        .msg audio { width:100%; border-radius:30px; margin-top:4px; }
        .msg .reactions { display:flex; gap:4px; margin-top:4px; flex-wrap:wrap; }
        .msg .reactions span { cursor:pointer; padding:0 6px; border-radius:12px; background:#0b0d15; font-size:14px; }
        .msg .del-btn { background:#ff6b6b; border:none; color:#fff; border-radius:20px; padding:0 10px; font-size:11px; cursor:pointer; margin-left:8px; }

        /* Ввод */
        .input-area {
            display:flex;
            align-items:center;
            gap:8px;
            background:#12161f;
            padding:6px 12px;
            border-radius:40px;
            border:1px solid #1e2538;
        }
        .input-area input {
            flex:1;
            background:transparent;
            border:none;
            color:#fff;
            padding:12px 0;
            font-size:16px;
            outline:none;
            min-width:0;
        }
        .input-area button {
            background:transparent;
            border:none;
            color:#e0e0e0;
            font-size:22px;
            cursor:pointer;
            padding:4px 8px;
        }
        .input-area .send { background:#6d8aff; border-radius:40px; padding:8px 18px; font-weight:600; color:#fff; font-size:16px; }
        .input-area .mic { background:#ff6b6b; border-radius:50%; width:44px; height:44px; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; transition:0.2s; }
        .input-area .mic.active { background:#ff0000; transform:scale(1.1); }
        .file-preview { display:none; align-items:center; gap:8px; background:#1a2030; padding:6px 12px; border-radius:30px; margin-top:6px; }
        .file-preview span { font-size:13px; }
        .file-preview button { background:#ff6b6b; border:none; color:#fff; border-radius:20px; padding:2px 12px; cursor:pointer; }

        #typing { font-size:13px; color:#667; font-style:italic; display:none; margin-bottom:4px; }
        .hidden { display:none; }

        #toggleSidebar { background:transparent; border:none; color:#e0e0e0; font-size:22px; cursor:pointer; padding:0 4px; }
        @media (max-width:600px) { #sidebar { width:220px; } }
    </style>
</head>
<body>

<!-- ПАНЕЛЬ КОНТАКТОВ -->
<div id="sidebar">
    <div class="header">
        <span style="font-weight:600;">📇 Контакты</span>
        <button id="closeSidebarBtn">✕</button>
    </div>
    <input id="searchContacts" placeholder="🔍 Поиск...">
    <div id="contactsList"></div>
    <div style="margin-top:8px; border-top:1px solid #1e2538; padding-top:8px;">
        <div style="font-size:13px; color:#667;">👥 Группы</div>
        <div id="groupsList"></div>
        <button id="createGroupBtn" style="background:transparent; border:1px solid #1e2538; border-radius:30px; padding:6px 12px; color:#e0e0e0; margin-top:6px; width:100%; cursor:pointer;">➕ Создать группу</button>
    </div>
    <div style="margin-top:8px; display:flex; gap:6px;">
        <input id="addFriendInput" placeholder="ID друга" style="flex:1; padding:8px; border-radius:30px; border:1px solid #1e2538; background:#0b0d15; color:#fff;">
        <button id="addFriendBtn" style="background:#6d8aff; border:none; border-radius:30px; padding:8px 14px; color:#fff; cursor:pointer;">➕</button>
    </div>
    <div id="addFriendResult" style="font-size:12px; color:#667; margin-top:4px;"></div>
</div>

<!-- ОСНОВНОЙ ЧАТ -->
<div id="main">
    <div class="top">
        <button id="toggleSidebar">☰</button>
        <h3 id="chatLabel">💬 Выберите чат</h3>
        <span id="unreadBadge" class="hidden" style="background:#ff6b6b; padding:2px 10px; border-radius:40px; font-size:12px;">🔔</span>
    </div>
    <div id="typing">✏️ Печатает...</div>
    <div id="messages"></div>

    <!-- Превью файла -->
    <div id="filePreview" class="file-preview">
        <span id="filePreviewName">📎 file.jpg</span>
        <button id="filePreviewCancel">✕</button>
    </div>

    <!-- Строка ввода -->
    <div class="input-area">
        <button id="fileBtn">📎</button>
        <input id="msgInput" placeholder="Сообщение..." autofocus>
        <button id="aiBtn" style="background:#00cc88; border-radius:40px; padding:6px 12px; color:#000; font-weight:600; font-size:14px;">🧠</button>
        <div id="micBtn" class="mic">🎤</div>
        <button id="sendBtn" class="send">➤</button>
    </div>
    <input type="file" id="fileInput" style="display:none;" accept="image/*,audio/*,video/*">
</div>

<script>
    // ==========================================
    // 1. КОНФИГ FIREBASE
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyCPiopo6vRsTyhUnoDpztKNFa84aYzS34s",
        authDomain: "sanyachats-2493a.firebaseapp.com",
        databaseURL: "https://sanyachats-2493a-default-rtdb.firebaseio.com",
        projectId: "sanyachats-2493a",
        storageBucket: "sanyachats-2493a.firebasestorage.app",
        messagingSenderId: "191784487633",
        appId: "1:191784487633:web:f290156eb5279b1273d3f0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    // ==========================================
    // 2. ID, ШИФРОВАНИЕ
    // ==========================================
    function genId() {
        let r='';
        for(let i=0;i<5;i++) r+='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'[Math.floor(Math.random()*62)];
        return r;
    }
    let myId = localStorage.getItem('my_id') || genId();
    if(!localStorage.getItem('my_id')) localStorage.setItem('my_id', myId);
    const myUid = 'anon_' + CryptoJS.SHA256(new Date().toISOString().slice(0,10)+'salt').toString(CryptoJS.enc.Hex).slice(0,8);

    let key = localStorage.getItem('chat_key') || 'секрет2026';
    function enc(t){ return CryptoJS.AES.encrypt(t,key).toString(); }
    function dec(c){ try{ return CryptoJS.AES.decrypt(c,key).toString(CryptoJS.enc.Utf8); } catch{ return '🔒'; } }

    // ==========================================
    // 3. DOM
    // ==========================================
    const messagesDiv = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const aiBtn = document.getElementById('aiBtn');
    const fileBtn = document.getElementById('fileBtn');
    const fileInput = document.getElementById('fileInput');
    const filePreview = document.getElementById('filePreview');
    const filePreviewName = document.getElementById('filePreviewName');
    const filePreviewCancel = document.getElementById('filePreviewCancel');
    const micBtn = document.getElementById('micBtn');
    const chatLabel = document.getElementById('chatLabel');
    const unreadBadge = document.getElementById('unreadBadge');
    const typingDiv = document.getElementById('typing');
    const contactsList = document.getElementById('contactsList');
    const groupsList = document.getElementById('groupsList');
    const addFriendInput = document.getElementById('addFriendInput');
    const addFriendBtn = document.getElementById('addFriendBtn');
    const addFriendResult = document.getElementById('addFriendResult');
    const searchContacts = document.getElementById('searchContacts');
    const toggleSidebar = document.getElementById('toggleSidebar');
    const closeSidebarBtn = document.getElementById('closeSidebarBtn');
    const sidebar = document.getElementById('sidebar');
    const createGroupBtn = document.getElementById('createGroupBtn');

    let currentChatId = null;
    let chatType = 'contact'; // contact | group
    let contacts = {};
    let groups = {};
    let onlineUsers = {};
    let unreadCount = 0;
    let nick = localStorage.getItem('anon_nick') || 'anon';
    let selectedFile = null;
    let mediaRecorder = null;
    let recording = false;

    // ==========================================
    // 4. ОНЛАЙН
    // ==========================================
    const onlineRef = db.ref('online/' + myUid);
    onlineRef.set({ online: true, lastSeen: Date.now() });
    onlineRef.onDisconnect().set({ online: false, lastSeen: Date.now() });

    function getOnlineStatus(uid) {
        db.ref('online/' + uid).on('value', snap => {
            const data = snap.val();
            if(data) onlineUsers[uid] = data.online;
            renderContacts();
        });
    }

    // ==========================================
    // 5. ПЕЧАТАЕТ
    // ==========================================
    msgInput.onkeydown = () => {
        if(!currentChatId) return;
        db.ref('typing/' + chatType + '/' + currentChatId + '/' + myUid).set(true);
    };
    msgInput.onkeyup = () => {
        setTimeout(() => {
            if(!currentChatId) return;
            db.ref('typing/' + chatType + '/' + currentChatId + '/' + myUid).remove();
        }, 800);
    };

    function listenTyping() {
        if(!currentChatId) return;
        db.ref('typing/' + chatType + '/' + currentChatId).on('value', snap => {
            const data = snap.val() || {};
            const typing = Object.keys(data).filter(uid => uid !== myUid).length > 0;
            typingDiv.style.display = typing ? 'block' : 'none';
        });
    }

    // ==========================================
    // 6. КОНТАКТЫ
    // ==========================================
    function loadContacts() {
        db.ref('contacts/' + myUid).once('value', snap => {
            contacts = snap.val() || {};
            renderContacts();
        });
    }

    function renderContacts() {
        const q = searchContacts.value.toLowerCase();
        contactsList.innerHTML = '';
        let onlineCountNum = 0;
        for(let uid in contacts) {
            const data = contacts[uid];
            if(!data.nick.toLowerCase().includes(q) && !data.id.toLowerCase().includes(q)) continue;
            const isOnline = onlineUsers[uid] === true;
            if(isOnline) onlineCountNum++;
            const div = document.createElement('div');
            div.className = 'contact-item';
            div.innerHTML = `
                <span onclick="openChat('${uid}','contact')"><span class="online ${isOnline?'on':'off'}"></span><strong>${data.nick}</strong> (${data.id})</span>
                <button class="del" onclick="deleteContact('${uid}')">✕</button>
            `;
            contactsList.appendChild(div);
        }
        if(!Object.keys(contacts).length) contactsList.innerHTML = '<div style="color:#667;padding:8px;">Нет контактов</div>';
    }

    window.deleteContact = function(uid) {
        if(!confirm('Удалить контакт?')) return;
        db.ref('contacts/' + myUid + '/' + uid).remove().then(() => {
            if(currentChatId === uid && chatType === 'contact') { currentChatId=null; chatLabel.textContent='💬 Выберите чат'; messagesDiv.innerHTML=''; }
            loadContacts();
        });
    };

    addFriendBtn.onclick = () => {
        const id = addFriendInput.value.trim();
        if(id.length!==5){ addFriendResult.textContent='❌ 5 символов'; return; }
        db.ref('users').once('value', snap => {
            const users = snap.val() || {};
            for(let uid in users) {
                if(users[uid].id && users[uid].id.toUpperCase() === id.toUpperCase()) {
                    db.ref('contacts/' + myUid + '/' + uid).set({ id: users[uid].id, nick: users[uid].nick || 'Без имени' })
                        .then(() => { addFriendResult.textContent='✅ Добавлен'; addFriendInput.value=''; loadContacts(); });
                    return;
                }
            }
            addFriendResult.textContent='❌ Не найден';
        });
    };

    // ==========================================
    // 7. ГРУППЫ
    // ==========================================
    function loadGroups() {
        db.ref('groups').once('value', snap => {
            const all = snap.val() || {};
            groups = {};
            for(let gid in all) {
                if(all[gid].members && all[gid].members[myUid]) groups[gid] = all[gid];
            }
            renderGroups();
        });
    }

    function renderGroups() {
        groupsList.innerHTML = '';
        for(let gid in groups) {
            const g = groups[gid];
            const div = document.createElement('div');
            div.className = 'group-item';
            div.textContent = '👥 ' + g.name + ' (' + Object.keys(g.members).length + ')';
            div.onclick = () => openChat(gid, 'group');
            groupsList.appendChild(div);
        }
        if(!Object.keys(groups).length) groupsList.innerHTML = '<div style="color:#667;font-size:13px;">Нет групп</div>';
    }

    createGroupBtn.onclick = () => {
        const name = prompt('Название группы:');
        if(!name) return;
        const gid = 'g_' + Date.now();
        const members = {};
        members[myUid] = { nick };
        const ids = prompt('Введите ID участников через запятую:');
        if(ids) {
            ids.split(',').forEach(id => {
                id = id.trim();
                for(let uid in contacts) {
                    if(contacts[uid].id.toUpperCase() === id.toUpperCase()) {
                        members[uid] = { nick: contacts[uid].nick };
                    }
                }
            });
        }
        db.ref('groups/' + gid).set({ name, members, created: Date.now() }).then(() => { loadGroups(); alert('Группа создана'); });
    };

    // ==========================================
    // 8. ОТКРЫТЬ ЧАТ
    // ==========================================
    window.openChat = function(id, type) {
        currentChatId = id;
        chatType = type;
        const label = type === 'contact' ? contacts[id]?.nick : groups[id]?.name;
        chatLabel.textContent = '💬 ' + (label || 'чат');
        unreadBadge.classList.add('hidden');
        unreadCount = 0;
        messagesDiv.innerHTML = '';
        typingDiv.style.display = 'none';
        if(type === 'contact') getOnlineStatus(id);
        loadMessages(id, type);
        listenTyping();
    };

    // ==========================================
    // 9. СООБЩЕНИЯ
    // ==========================================
    function loadMessages(chatId, type) {
        const ref = db.ref('chats/' + type + '/' + chatId);
        ref.limitToLast(50).on('child_added', snap => renderMessage(snap.val(), snap.key, type, chatId));
    }

    function renderMessage(data, msgId) {
        const div = document.createElement('div');
        div.className = 'msg';
        if(data.from === myUid) div.classList.add('own');

        const sender = data.from === myUid ? 'Вы' : (contacts[data.from]?.nick || groups[data.from]?.members?.[data.from]?.nick || 'anon');
        let content = '';
        if(data.text) {
            const decrypted = dec(data.text);
            content = `<div>${decrypted}</div>`;
        }
        if(data.image) content += `<img src="${data.image}" alt="фото">`;
        if(data.audio) content += `<audio controls src="${data.audio}"></audio>`;
        if(data.video) content += `<video controls src="${data.video}"></video>`;
        if(data.ai) content = `<div><span class="ai-label">🤖 ИИ</span>: ${data.ai}</div>`;

        let reactionsHtml = '';
        if(data.reactions) {
            for(let emoji in data.reactions) {
                reactionsHtml += `<span onclick="addReaction('${msgId}','${emoji}')">${emoji} ${Object.keys(data.reactions[emoji]).length}</span>`;
            }
        }

        div.innerHTML = `
            <div class="nick">${sender} ${data.from === myUid ? `<button class="del-btn" onclick="deleteForAll('${msgId}')">🗑️</button>` : ''}</div>
            ${content}
            <div class="reactions">
                <span onclick="addReaction('${msgId}','👍')">👍</span>
                <span onclick="addReaction('${msgId}','❤️')">❤️</span>
                <span onclick="addReaction('${msgId}','🔥')">🔥</span>
                ${reactionsHtml}
            </div>
        `;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        if(data.from !== myUid && currentChatId !== data.from) {
            unreadCount++;
            unreadBadge.classList.remove('hidden');
            unreadBadge.textContent = '🔔 ' + unreadCount;
        }
    }

    window.addReaction = function(msgId, emoji) {
        if(!currentChatId) return;
        const ref = db.ref('chats/' + chatType + '/' + currentChatId + '/' + msgId + '/reactions/' + emoji);
        ref.child(myUid).set(true);
    };

    window.deleteForAll = function(msgId) {
        if(!confirm('Удалить для всех?')) return;
        db.ref('chats/' + chatType + '/' + currentChatId + '/' + msgId).remove();
    };

    // ==========================================
    // 10. ОТПРАВКА
    // ==========================================
    function sendToFirebase(data) {
        if(!currentChatId) { alert('Выберите чат'); return; }
        const ref = db.ref('chats/' + chatType + '/' + currentChatId);
        ref.push({ from: myUid, timestamp: Date.now(), ...data });
    }

    function sendMessage() {
        const text = msgInput.value.trim();
        if(!text && !selectedFile) return;
        if(text) {
            if(text.startsWith('/ai ')) {
                const q = text.slice(4);
                askAI(q);
                msgInput.value = '';
                return;
            }
            sendToFirebase({ text: enc(text) });
        }
        if(selectedFile) {
            const ext = selectedFile.name.split('.').pop();
            const type = selectedFile.type.startsWith('image/') ? 'image' : 
                         selectedFile.type.startsWith('video/') ? 'video' : 'audio';
            const path = 'files/' + myUid + '/' + Date.now() + '_' + selectedFile.name;
            const ref = storage.ref(path);
            ref.put(selectedFile).then(snap => snap.ref.getDownloadURL()).then(url => {
                const payload = {};
                payload[type] = url;
                sendToFirebase(payload);
                filePreview.style.display = 'none';
                selectedFile = null;
            });
        }
        msgInput.value = '';
        filePreview.style.display = 'none';
        selectedFile = null;
    }

    // ==========================================
    // 11. ИИ
    // ==========================================
    async function askAI(question) {
        try {
            const resp = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(question)}&format=json&no_html=1&skip_disambig=1`);
            const data = await resp.json();
            let answer = data.AbstractText || '❌ Не нашёл ответа.';
            if(!data.AbstractText) answer += `\n🔗 Поиск: https://google.com/search?q=${encodeURIComponent(question)}`;
            sendToFirebase({ ai: answer });
        } catch {
            sendToFirebase({ ai: '⚠️ Ошибка, попробуй позже. 🔗 https://google.com/search?q=' + encodeURIComponent(question) });
        }
        msgInput.value = '';
    }

    aiBtn.onclick = () => {
        const q = msgInput.value.trim();
        if(!q) return alert('Напиши вопрос');
        askAI(q);
    };

    // ==========================================
    // 12. ФАЙЛЫ
    // ==========================================
    fileBtn.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        selectedFile = file;
        filePreviewName.textContent = '📎 ' + file.name;
        filePreview.style.display = 'flex';
        fileInput.value = '';
    };
    filePreviewCancel.onclick = () => {
        selectedFile = null;
        filePreview.style.display = 'none';
    };

    // ==========================================
    // 13. ГОЛОСОВЫЕ (зажатие)
    // ==========================================
    let micStream = null;
    micBtn.onmousedown = async () => {
        if(!currentChatId) { alert('Выберите чат'); return; }
        try {
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(micStream);
            const chunks = [];
            mediaRecorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const file = new File([blob], 'voice.webm', { type: 'audio/webm' });
                const ref = storage.ref('files/' + myUid + '/' + Date.now() + '_voice.webm');
                ref.put(file).then(snap => snap.ref.getDownloadURL()).then(url => {
                    sendToFirebase({ audio: url });
                });
                if(micStream) micStream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start();
            micBtn.classList.add('active');
            micBtn.textContent = '⏹️';
        } catch { alert('Нет микрофона'); }
    };
    micBtn.onmouseup = () => {
        if(mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            micBtn.classList.remove('active');
            micBtn.textContent = '🎤';
        }
    };
    micBtn.onmouseleave = () => {
        if(mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            micBtn.classList.remove('active');
            micBtn.textContent = '🎤';
        }
    };

    // ==========================================
    // 14. ОБНОВЛЕНИЕ В РЕАЛЬНОМ ВРЕМЕНИ
    // ==========================================
    db.ref('contacts/' + myUid).on('value', loadContacts);
    db.ref('groups').on('value', loadGroups);

    // ==========================================
    // 15. СОХРАНЕНИЕ ПРОФИЛЯ
    // ==========================================
    db.ref('users/' + myUid).set({ id: myId, nick, lastSeen: Date.now() });

    // ==========================================
    // 16. СОБЫТИЯ
    // ==========================================
    sendBtn.onclick = sendMessage;
    msgInput.onkeydown = (e) => { if(e.key === 'Enter') { e.preventDefault(); sendMessage(); } };

    toggleSidebar.onclick = () => sidebar.classList.toggle('hidden');
    closeSidebarBtn.onclick = () => sidebar.classList.add('hidden');

    searchContacts.oninput = renderContacts;

    // ==========================================
    // 17. ЗАПУСК
    // ==========================================
    loadContacts();
    loadGroups();
    chatLabel.textContent = '💬 Выберите чат';

    console.log('🔐 Твой ID:', myId);
</script>
</body>
</html>
